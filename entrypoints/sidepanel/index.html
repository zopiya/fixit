<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixIt</title>
    <style>
      @import "tailwindcss";
    </style>
  </head>
  <body class="flex flex-col h-screen bg-white text-slate-800 font-sans antialiased">
    <div id="annotation-list" class="flex-1 overflow-y-auto px-3 py-2"></div>
    <div class="toolbar flex items-center justify-between px-4 py-2.5 border-t border-slate-100">
      <button id="clear-btn" class="w-9 h-9 rounded-md bg-slate-50 text-slate-500 border border-slate-200 hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-colors text-lg" title="🗑">🗑</button>
      <button id="copy-btn" class="h-9 px-4 rounded-md bg-blue-500 text-white text-sm font-medium hover:bg-blue-600 transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled>复制</button>
    </div>
    <div id="toast" class="fixed bottom-14 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-medium opacity-0 transition-opacity pointer-events-none z-50"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
